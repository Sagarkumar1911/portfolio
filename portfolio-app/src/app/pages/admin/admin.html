<section id="admin">
    <h2>Admin <span class="gradient-text">Dashboard</span></h2>
    <div class="contact-container" style="max-width: 800px;">
        <h3 style="margin-bottom: 2rem; text-align: center;">Add New Project</h3>
        <form (ngSubmit)="onSubmit()" #adminForm="ngForm">
            <div *ngIf="submitSuccess" class="form-group" style="padding: 1rem; background: rgba(34, 197, 94, 0.1); border: 1px solid #22c55e; border-radius: 8px; color: #22c55e; margin-bottom: 1rem;">
                 Project successfully added to the database!
            </div>
            <div *ngIf="submitError" class="form-group" style="padding: 1rem; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; border-radius: 8px; color: #ef4444; margin-bottom: 1rem;">
                 {{ submitError }}
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; display: block;">Project Title *</label>
                    <input type="text" name="title" [(ngModel)]="projectData.title" placeholder="e.g. Sentimental Analysis Bot" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; display: block;">Category *</label>
                    <select name="category" [(ngModel)]="projectData.category" style="width: 100%; padding: 1rem; background: var(--bg-dark); border: 1px solid var(--border-light); border-radius: 8px; color: white; font-size: 1rem; transition: 0.3s; appearance: none;">
                        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; display: block;">Description</label>
                <textarea name="description" [(ngModel)]="projectData.description" rows="4" placeholder="Brief description of your project..."></textarea>
            </div>

            <div class="form-group">
                <label style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; display: block;">Image URL (Optional)</label>
                <input type="text" name="image" [(ngModel)]="projectData.image" placeholder="https://via.placeholder.com/400x300 or link to image">
            </div>

            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <label style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; display: block;">GitHub Link</label>
                    <input type="text" name="github_link" [(ngModel)]="projectData.github_link" placeholder="https://github.com/... ">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; display: block;">Live Demo Link</label>
                    <input type="text" name="live_link" [(ngModel)]="projectData.live_link" placeholder="https://yourproject.com">
                </div>
            </div>

            <button type="submit" class="contact-btn" [disabled]="adminForm.invalid || isSubmitting" [style.opacity]="(adminForm.invalid || isSubmitting) ? 0.6 : 1" style="margin-top: 1rem;">
                {{ isSubmitting ? 'Adding...' : 'Add Project to Database' }} <i class="fas fa-database" *ngIf="!isSubmitting"></i>
            </button>
        </form>
    </div>
</section>
