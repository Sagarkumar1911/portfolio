<section id="project-detail" style="min-height: 80vh; display: flex; flex-direction: column; align-items: center; padding: 4rem 2rem;">
    <div style="width: 100%; max-width: 800px;">
        <button (click)="goBack()" style="background: none; border: none; color: var(--accent); font-size: 1.1rem; cursor: pointer; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.5rem; transition: 0.3s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">
            <i class="fas fa-arrow-left"></i> Back to Projects
        </button>

        <div *ngIf="loading" style="text-align: center; color: var(--text-muted); font-size: 1.2rem; padding: 3rem 0;">
            <p><i class="fas fa-spinner fa-spin"></i> Loading Project details...</p>
        </div>

        <div *ngIf="error" style="text-align: center; color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 2rem; border-radius: 8px; border: 1px solid #ef4444;">
            <h3><i class="fas fa-exclamation-triangle"></i> Error</h3>
            <p>{{ error }}</p>
            <button (click)="loadProjectDetails(1)" style="margin-top: 1rem; padding: 0.5rem 1.5rem; border-radius: 20px; border: none; background: var(--accent); color: white; cursor: pointer;">Try Again</button>
        </div>

        <div *ngIf="!loading && !error && project" class="detail-card" style="background: var(--bg-dark); border: 1px solid var(--border-light); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
            <div class="img-container" style="width: 100%; height: 400px; background-image: url('{{ project.image }}'); background-size: cover; background-position: center; position: relative;">
                <div *ngIf="!project.image || project.image.startsWith('https://via.placeholder')" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5);">
                    <i class="fas fa-laptop-code" style="font-size: 5rem; color: rgba(255,255,255,0.2);"></i>
                </div>
            </div>
            
            <div class="content" style="padding: 2.5rem;">
                <span class="tech-badge" style="display: inline-block; padding: 0.3rem 0.8rem; background: rgba(56, 189, 248, 0.1); color: var(--accent); border-radius: 20px; font-size: 0.8rem; margin-bottom: 1rem;">
                    {{ project.category }}
                </span>
                <h1 style="font-size: 2.5rem; margin-bottom: 1.5rem; color: white;">{{ project.title }}</h1>
                
                <h3 style="color: var(--text-muted); font-size: 1.2rem; margin-bottom: 0.5rem;">Description:</h3>
                <p style="color: var(--text-muted); font-size: 1.1rem; line-height: 1.8; margin-bottom: 2.5rem;">
                    {{ project.description }}
                </p>
                
                <div class="links" style="display: flex; gap: 1.5rem;">
                    <a [href]="project.github_link" target="_blank" style="padding: 0.8rem 1.5rem; border-radius: 8px; border: 1px solid var(--border-light); color: white; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='transparent'">
                        <i class="fab fa-github"></i> View Source
                    </a>
                    <a [href]="project.live_link" target="_blank" style="padding: 0.8rem 1.5rem; border-radius: 8px; background: var(--accent); color: white; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; font-weight: bold; transition: 0.3s; border: none; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);" onmouseover="this.style.transform='translateY(-2px)';" onmouseout="this.style.transform='translateY(0)';">
                        <i class="fas fa-external-link-alt"></i> Live Demo
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
