<section id="projects">
    <h2>My <span class="gradient-text">Projects</span></h2>
    
    <div class="filter-buttons">
        <button class="filter-btn" [class.active]="activeFilter === 'all'" (click)="filterProjects('all')">All</button>
        <button class="filter-btn" [class.active]="activeFilter === 'Deep Learning'" (click)="filterProjects('Deep Learning')">Deep Learning</button>
        <button class="filter-btn" [class.active]="activeFilter === 'Web Dev'" (click)="filterProjects('Web Dev')">Web Dev</button>
    </div>

    <div *ngIf="loading" class="projects-grid">
        <p class="loading-text">Loading projects from MySQL API...</p>
    </div>

    <div *ngIf="error" class="projects-grid">
        <p class="loading-text" style="color: #ef4444;">{{ error }}</p>
    </div>

    <div *ngIf="!loading && !error" class="projects-grid">
        <div *ngFor="let project of filteredProjects" class="project-card">
            <div class="project-img" [style.background-image]="'url(' + project.image + ')'" style="background-size: cover; background-position: center;">
                <i *ngIf="!project.image || project.image.startsWith('https://via.placeholder')" class="fas fa-laptop-code" style="text-shadow: 0 0 10px rgba(0,0,0,0.5);"></i>
            </div>
            <div class="project-content">
                <div style="margin-bottom: 1rem;">
                    <span class="tech-badge">{{ project.category }}</span>
                </div>
                <h3 style="margin-bottom: 0.5rem; color: white;">{{ project.title }}</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; flex-grow: 1;">
                    {{ project.description }}
                </p>
                <div style="display: flex; gap: 1rem; margin-top: auto;">
                    <a [href]="project.github_link" target="_blank" style="color: white; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem;">
                        <i class="fab fa-github"></i> Code
                    </a>
                    <a [href]="project.live_link" target="_blank" style="color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem;">
                        <i class="fas fa-external-link-alt"></i> Live
                    </a>
                </div>
            </div>
        </div>
        
        <div *ngIf="filteredProjects.length === 0" style="grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 2rem;">
            No projects found in this category.
        </div>
    </div>
</section>
